<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dexflix - Perfis</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="./js-css/style.css">
</head>

<body>


    <div class="screen">
        <header class="topbar">
            <a href="index.html" class="logo" aria-label="Voltar para a página inicial da Dexflix">
                <h1>DEXFLIX</h1>
            </a>

            <button id="nav-toggle" class="nav-toggle" type="button" aria-label="Abrir menu" aria-controls="nav-menu"
                aria-expanded="false">
                <span class="fa-solid fa-bars" aria-hidden="true"></span>
            </button>

            <nav class="nav-menu" id="nav-menu" aria-label="Menu principal">
                <a href="index.html">Início</a>
                <a href="#">Ofertas</a>
                <a href="#">Cadastro</a>
                <a href="#">Login</a>
                <a href="#">Conta</a>
            </nav>

            <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Trocar tema">
                <span class="theme-icon" aria-hidden="true">🌙</span>
            </button>
        </header>

        <main>
            <section class="content profiles-page" aria-labelledby="profiles-title">
                <h2 id="profiles-title">Quem está assistindo?</h2>

                <div class="profiles" role="list">
                    <article class="profile-card" role="listitem">
                        <a href="catalog.html?perfil=Dexart">
                            <img src="./arquivos-uteis/unnamed.dex.jpg" alt="Perfil André">
                        </a>
                        <span>Dexart</span>

                    </article>

                    <article class="profile-card" role="listitem">
                            <a href="catalog.html?perfil=Loid">
                        <img src="./arquivos-uteis/Loyd.jpg" alt="Perfil Visitante">
                            </a>
                        <span>Loid</span>
                    </article>

                    <article class="profile-card" role="listitem">
                        <a href="catalog.html?perfil=Zoro">
                            <img src="./arquivos-uteis/perdidão.png" alt="Perfil Família">
                        </a>
                        <span>Zoro</span>
                    </article>

                    <article class="profile-card" role="listitem">
                        <a href="catalog.html?perfil=Kids">
                            <img src="./arquivos-uteis/anya.jpg" alt=" Perfil Anya">
                        </a>
                        <span>Kids</span>
                    </article>

                    <article class="profile-card manage-profile" role="listitem">
                        <div class="gear-avatar" aria-hidden="true">
                            <i class="fa-solid fa-gear gear-icon"></i>
                        </div>
                        <span>Configurações</span>
                    </article>
                </div>
            </section>
        </main>
    </div>

    <script src="./js-css/script.js"></script>
</body>

</html>
